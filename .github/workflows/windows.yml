name: windows
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "src-tauri" }
      - name: Install tauri-cli
        uses: taiki-e/install-action@v2
        with: { tool: tauri-cli }
      - name: Build
        run: cargo tauri build
      - name: Check size (< 20 Mo)
        shell: bash
        run: |
          for EXE in src-tauri/target/release/superpopaul.exe \
                     src-tauri/target/release/bundle/nsis/*.exe; do
            SIZE=$(stat -c%s "$EXE")
            echo "Taille : $((SIZE / 1024 / 1024)) Mo — $EXE"
            test "$SIZE" -lt 20971520
          done
      - uses: actions/upload-artifact@v4
        with:
          name: SuperPopaul-windows
          path: |
            src-tauri/target/release/superpopaul.exe
            src-tauri/target/release/bundle/nsis/*.exe

  # Publication GitHub Release sur tag uniquement. Job séparé : le build
  # reste en contents: read, seul ce job a le droit d'écriture.
  # Sécurité injection : $GITHUB_REF_NAME est lu comme variable d'env du
  # runner (jamais interpolé ${{ }} dans le run), et le if: borne aux tags
  # v* (poussables uniquement avec droit d'écriture au repo).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: SuperPopaul-windows, path: dist }
      - name: Publier la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Super Popaul ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            dist/superpopaul.exe dist/bundle/nsis/*.exe
