# Reverse-proxy nginx (TLS) devant l'API Peppol Resolver.
#
#   1) Adaptez server_name à votre domaine.
#   2) Obtenez un certificat :  sudo certbot --nginx -d peppol.mondomaine.fr
#      (certbot réécrit alors les directives ssl_* ci-dessous).
#   3) sudo cp deploy/nginx-peppol-api.conf /etc/nginx/sites-available/peppol-api
#      sudo ln -s /etc/nginx/sites-available/peppol-api /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#
# La clé d'API reste gérée par l'application (header X-API-Key / Bearer) ; nginx
# ne fait que le TLS, le proxy et un rate-limit réseau grossier en amont.

# Rate-limit de bordure (complète celui, par clé, de l'application).
limit_req_zone $binary_remote_addr zone=peppol_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name peppol.mondomaine.fr;
    # Redirige tout le trafic clair vers HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name peppol.mondomaine.fr;

    # Remplacés par certbot lors de l'émission du certificat.
    ssl_certificate     /etc/letsencrypt/live/peppol.mondomaine.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peppol.mondomaine.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # En-têtes de sécurité de base.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Healthcheck public, non compté dans le rate-limit.
    location = /health {
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        limit_req zone=peppol_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
